name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_name:
        description: "Nombre opcional para la release"
        required: false
        default: ""

permissions:
  contents: write

defaults:
  run:
    working-directory: android

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Prepare APK name
        id: apk
        run: |
          VERSION=$(grep -m1 'versionName' app/build.gradle.kts | sed -E 's/.*"(.*)".*/\1/')
          SRC=app/build/outputs/apk/debug/app-debug.apk
          DEST="Fichaje-${VERSION}.apk"
          cp "$SRC" "$DEST"
          echo "path=android/$DEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fichaje-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      # Solo publica release en tags v* o al lanzarlo a mano (evita releases en cada push a main).
      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || format('Fichaje {0}', steps.apk.outputs.version) }}
          body: |
            APK de Fichaje (build de depuración, instalable directamente).

            **Instalación:** descarga `Fichaje-*.apk`, ábrelo en el móvil y permite la
            instalación de orígenes desconocidos si te lo pide.
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
